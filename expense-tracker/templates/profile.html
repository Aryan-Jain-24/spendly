{% extends "base.html" %}

{% block title %}Your Profile — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Your profile</h1>
            <p class="auth-subtitle">Account details for your Spendly account</p>
        </div>

        <div class="auth-card profile-card">
            <div class="profile-avatar">{{ user.name[0]|upper }}</div>
            <h2 class="profile-name">{{ user.name }}</h2>
            <p class="profile-email">{{ user.email }}</p>
            <p class="profile-meta">Member since {{ member_since }}</p>
        </div>

    </div>
</section>

{% endblock %}
